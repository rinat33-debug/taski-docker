# Файл docker-compose.production.yml

# Перечень volume для продакшена
volumes:
  pg_data_production:
  static_volume:

networks:
  app-network:
    driver: bridge

# Перечень контейнеров
services:
  # Контейнер БД
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
    networks:
      - app-network

  # Контейнер с бэкендом
  backend:
    image: rinat33debug/taski_backend:latest  # Ваш образ на Docker Hub
    env_file: .env
    depends_on:
      - db
    networks:
      - app-network
    restart: on-failure
    volumes: 
      - static_volume:/backend_static

  # Контейнер с фронтендом
  frontend:
    image: rinat33debug/taski_frontend:latest  # Ваш образ на Docker Hub
    env_file: .env
    command: sh -c "cp -r /app/build/. /frontend_static/"
    volumes:
      - static_volume:/frontend_static/
    networks:
      - app-network
    depends_on:
      - backend

  # Контейнер gateway
  gateway:
    image: rinat33debug/taski_gateway:latest  # Ваш образ на Docker Hub
    env_file: .env
    volumes:
      - static_volume:/staticfiles
    ports:
      - 8000:80
    networks:
      - app-network
    depends_on:
      - backend
    restart: always